name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Write the Supabase config directly from GitHub Secrets
      - name: Create Supabase config from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: |
          cat > auth/supabase-config.js << EOF
          var SUPABASE_URL  = '${SUPABASE_URL}';
          var SUPABASE_ANON = '${SUPABASE_ANON}';
          var _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
            auth: {
              persistSession    : true,
              autoRefreshToken  : true,
              detectSessionInUrl: true
            }
          });
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
