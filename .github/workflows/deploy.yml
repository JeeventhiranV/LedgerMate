name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Write the Supabase config directly from GitHub Secrets
      - name: Create Supabase config from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON" ]; then
            echo "ERROR: SUPABASE_URL or SUPABASE_ANON secret is not set in GitHub repository secrets."
            exit 1
          fi
          python3 - <<'PYEOF'
          import os
          url  = os.environ['SUPABASE_URL']
          anon = os.environ['SUPABASE_ANON']
          content = (
            "var SUPABASE_URL  = '" + url  + "';\n"
            "var SUPABASE_ANON = '" + anon + "';\n"
            "var _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {\n"
            "  auth: {\n"
            "    persistSession    : true,\n"
            "    autoRefreshToken  : true,\n"
            "    detectSessionInUrl: true\n"
            "  }\n"
            "});\n"
          )
          with open('auth/supabase-config.js', 'w') as f:
              f.write(content)
          print('Created auth/supabase-config.js (' + str(len(content)) + ' bytes)')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
