name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Inject secrets into the config file from the example template
      - name: Create Supabase config from secrets
        run: |
          cp auth/supabase-config.example.js auth/supabase-config.js
          sed -i "s|YOUR_PROJECT_REF.supabase.co|${{ secrets.SUPABASE_URL }}|g" auth/supabase-config.js
          sed -i "s|YOUR_ANON_PUBLIC_KEY|${{ secrets.SUPABASE_ANON }}|g" auth/supabase-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
