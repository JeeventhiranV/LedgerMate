<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DSA Animator — Algorithm Visualizer</title>
<meta name="description" content="Interactive, animated visualizations of data structures and algorithms — sorting, searching, stacks, queues, linked lists, trees and graphs."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════════════
   DSA ANIMATOR — DESIGN SYSTEM
   Token names kept compatible with auth-guard.js injected UI.
════════════════════════════════════════════════════════════ */
:root[data-theme="dark"]{
  --bg:#07090f;--bg2:#0e1117;--bg3:#141820;--bg4:#1a1f2e;
  --border:#1e2436;--border2:#2a3148;
  --text:#e2e8f8;--text2:#8a95b8;--text3:#535d7e;
  --blue:#4f8ef7;--purple:#8b5cf6;--teal:#06d6a0;--rose:#f43f5e;
  --gold:#f59e0b;--orange:#fb923c;--pink:#ec4899;--cyan:#22d3ee;--emerald:#34d399;
  --card:#0f1319;--card2:#13192300;
  --glow-blue:rgba(79,142,247,0.15);--glow-purple:rgba(139,92,246,0.12);
  --shadow:0 8px 32px rgba(0,0,0,0.6);
  --glass:rgba(14,17,23,0.8);
  --sidebar-w:272px;
}
:root[data-theme="light"]{
  --bg:#eef2fb;--bg2:#ffffff;--bg3:#f5f7ff;--bg4:#e9edfa;
  --border:#dde3f5;--border2:#c5cee8;
  --text:#1a1e35;--text2:#475089;--text3:#8891be;
  --blue:#2563eb;--purple:#7c3aed;--teal:#059669;--rose:#e11d48;
  --gold:#d97706;--orange:#ea580c;--pink:#db2777;--cyan:#0891b2;--emerald:#059669;
  --card:#ffffff;--card2:#f7f9ff;
  --glow-blue:rgba(37,99,235,0.09);--glow-purple:rgba(124,58,237,0.08);
  --shadow:0 4px 20px rgba(20,30,80,0.1);
  --glass:rgba(255,255,255,0.9);
  --sidebar-w:272px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
a{color:inherit}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:4px}

/* ── SCROLL PROGRESS ── */
#scroll-progress{position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,var(--blue),var(--purple),var(--teal));z-index:9999;transition:width .1s}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;overflow-y:auto;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-inner{padding:14px 0 8px;flex:1}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:190;backdrop-filter:blur(2px)}
.overlay.show{display:block}

/* ── SIDEBAR LOGO ── */
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 18px 14px;border-bottom:1px solid var(--border);margin-bottom:6px;cursor:pointer}
.sidebar-logo-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--blue),var(--purple));display:grid;place-items:center;font-size:19px;flex-shrink:0;box-shadow:0 4px 14px var(--glow-blue)}
.sidebar-logo-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
.sidebar-logo-text small{display:block;font-size:10px;font-weight:400;color:var(--text3);font-family:'Inter',sans-serif;margin-top:1px}

/* ── SIDEBAR SEARCH ── */
.sidebar-search{padding:10px 12px 8px;position:relative}
.sidebar-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 12px 8px 32px;font-size:13px;color:var(--text);outline:none;font-family:'Inter',sans-serif;transition:border .2s}
.sidebar-search input:focus{border-color:var(--blue)}
.sidebar-search .srch-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}

/* ── SIDEBAR NAV ── */
.nav-group{margin-bottom:4px}
.nav-group-label{display:flex;align-items:center;gap:8px;padding:9px 18px 5px;font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--text3);text-transform:uppercase}
.nav-group-label .gicon{font-size:12px}
.nav-link{display:flex;align-items:center;gap:9px;width:100%;padding:7px 18px 7px 36px;background:none;border:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
.nav-link:hover{background:var(--bg3);color:var(--text)}
.nav-link.active{background:var(--glow-blue);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.nav-link .ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.7}
.sidebar-quick{padding:10px 18px 16px;border-top:1px solid var(--border);margin-top:6px}
.sidebar-quick-label{font-size:10px;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.sidebar-quick a{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);text-decoration:none;padding:6px 0;transition:color .2s}
.sidebar-quick a:hover{color:var(--blue)}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.menu-btn{display:none;background:none;border:1px solid var(--border);border-radius:8px;padding:6px 9px;cursor:pointer;color:var(--text2);font-size:16px}
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 11px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--blue)}
.crumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text2);min-width:0;overflow:hidden}
.crumb a{color:var(--text3);text-decoration:none;cursor:pointer;white-space:nowrap}
.crumb a:hover{color:var(--blue)}
.crumb .sep{color:var(--text3);opacity:.6}
.crumb strong{color:var(--text);font-weight:600;font-family:'Syne',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.theme-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--text2);font-size:15px;transition:all .2s}
.theme-btn:hover{background:var(--bg3);border-color:var(--blue)}

/* ── VIEW TRANSITIONS ── */
#view{flex:1;animation:viewIn .35s cubic-bezier(.22,1,.36,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

/* ── HERO ── */
.hero{padding:54px 28px 30px;background:linear-gradient(160deg,var(--bg) 0%,var(--bg3) 55%,var(--bg) 100%);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-90px;right:-70px;width:420px;height:420px;background:radial-gradient(circle,var(--glow-purple) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-80px;left:-60px;width:340px;height:340px;background:radial-gradient(circle,var(--glow-blue) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--blue);text-transform:uppercase;margin-bottom:14px;font-family:'JetBrains Mono',monospace}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(28px,4.4vw,48px);font-weight:800;line-height:1.12;margin-bottom:14px;background:linear-gradient(135deg,var(--text) 28%,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
.hero-desc{font-size:14.5px;color:var(--text2);max-width:680px;line-height:1.7;margin-bottom:26px;position:relative}
.hero-stats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:26px;position:relative}
.stat-chip{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:13px 22px;display:flex;flex-direction:column;align-items:center;min-width:104px}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px}
.hero-search{position:relative;max-width:580px}
.hero-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:13px;padding:14px 16px 14px 46px;font-size:14px;color:var(--text);outline:none;font-family:'Inter',sans-serif;transition:all .2s}
.hero-search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--glow-blue)}
.hero-search input::placeholder{color:var(--text3)}
.hero-search .hs-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.hero-search kbd{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* ── CATEGORY SECTIONS (home) ── */
.home-content{padding:28px}
.cat-section{margin-bottom:42px;animation:fadeUp .4s both}
.cat-section.hidden{display:none}
.cat-header{display:flex;align-items:center;gap:13px;margin-bottom:18px;padding-bottom:13px;border-bottom:1px solid var(--border)}
.cat-icon{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:21px;flex-shrink:0}
.cat-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;color:var(--text)}
.cat-subtitle{font-size:12.5px;color:var(--text3);margin-top:2px}
.cat-badge{margin-left:auto;font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 11px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap}

.algo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:15px}
.algo-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:18px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden;display:flex;flex-direction:column}
.algo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--blue));opacity:0;transition:opacity .2s}
.algo-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-3px)}
.algo-card:hover::before{opacity:1}
.algo-card.hidden{display:none}
.algo-card-top{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.algo-card-icon{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border)}
.algo-card-name{font-size:14.5px;font-weight:600;color:var(--text);line-height:1.3}
.algo-card-desc{font-size:12.5px;color:var(--text3);line-height:1.6;margin-bottom:13px;flex:1}
.algo-card-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.diff-tag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'JetBrains Mono',monospace;letter-spacing:.02em}
.diff-tag.easy{background:rgba(6,214,160,.13);color:var(--teal)}
.diff-tag.medium{background:rgba(245,158,11,.13);color:var(--gold)}
.diff-tag.hard{background:rgba(244,63,94,.13);color:var(--rose)}
.cx-tag{font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.algo-card-cta{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--blue);margin-top:auto}
.algo-card-cta .arr{transition:transform .2s}
.algo-card:hover .algo-card-cta .arr{transform:translateX(4px)}

.no-results{text-align:center;padding:70px 24px;display:none}
.no-results-icon{font-size:46px;margin-bottom:12px;opacity:.7}
.no-results-text{color:var(--text3);font-size:14px}

/* ── SKELETON LOADER ── */
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:15px;padding:28px}
.skel-card{height:182px;border-radius:15px;background:var(--bg3);border:1px solid var(--border);position:relative;overflow:hidden}
.skel-card::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--bg4),transparent);transform:translateX(-100%);animation:shimmer 1.3s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}

/* ════════════════════════════════════════════════════════════
   VISUALIZER
════════════════════════════════════════════════════════════ */
.viz-wrap{padding:22px 28px 40px;animation:fadeUp .4s both}
.viz-head{margin-bottom:18px}
.viz-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:11px}
.viz-title .vt-icon{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:19px;background:var(--bg3);border:1px solid var(--border)}
.viz-tags{display:flex;gap:8px;flex-wrap:wrap;margin:11px 0 9px}
.viz-desc{font-size:13.5px;color:var(--text2);line-height:1.7;max-width:760px}

.viz-body{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start;margin-top:18px}
.viz-main{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;min-width:0}

/* Stage */
.viz-stage{min-height:340px;border-radius:12px;background:linear-gradient(180deg,var(--bg3),var(--bg2));border:1px solid var(--border);position:relative;overflow:hidden}
.bars-stage{display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:30px 18px 34px;height:340px}
.bar{flex:1;max-width:54px;min-width:5px;background:linear-gradient(180deg,var(--blue),#3b6fd4);border-radius:5px 5px 0 0;position:relative;display:flex;justify-content:center;transition:height .25s cubic-bezier(.4,0,.2,1),background .15s;align-self:flex-end}
.bar-val{position:absolute;bottom:-22px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);font-weight:600}
.bar.s-cmp{background:linear-gradient(180deg,var(--gold),var(--orange))}
.bar.s-swap{background:linear-gradient(180deg,var(--rose),#c81e4f)}
.bar.s-pivot{background:linear-gradient(180deg,var(--purple),#6d3fd1)}
.bar.s-cur{background:linear-gradient(180deg,var(--cyan),#0e9bb5)}
.bar.s-done{background:linear-gradient(180deg,var(--teal),#04a87c)}
.bar.s-found{background:linear-gradient(180deg,var(--teal),#04a87c);box-shadow:0 0 0 2px var(--teal),0 0 16px var(--teal)}
.bar.s-active{background:linear-gradient(180deg,#5f9bf9,#3b6fd4);box-shadow:inset 0 0 0 2px var(--cyan)}
.bar.s-faded{background:linear-gradient(180deg,var(--bg4),var(--bg4));opacity:.45}
.bar.s-bound{box-shadow:inset 0 0 0 2px var(--blue)}

/* Structure stages */
.empty-note{position:absolute;inset:0;display:grid;place-items:center;color:var(--text3);font-size:13px;font-style:italic}
.struct-stage{padding:26px;display:flex;align-items:center;justify-content:center}
.node-box{min-width:52px;height:52px;padding:0 8px;border-radius:11px;background:var(--bg4);border:2px solid var(--border2);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--text);position:relative;transition:all .25s;animation:pop .3s both}
.node-box .ptr{position:absolute;font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.05em;text-transform:uppercase}
.node-box.hl-add{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal),0 0 18px var(--glow-blue);color:var(--teal)}
.node-box.hl-rm{border-color:var(--rose);box-shadow:0 0 0 2px var(--rose);color:var(--rose)}
.node-box.hl-peek,.node-box.hl-current{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);color:var(--gold)}
.node-box.hl-visit{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue);color:var(--blue)}
.node-box.hl-found{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal),0 0 18px var(--teal);color:var(--teal)}
.node-box.hl-done{border-color:var(--teal);opacity:.7}

/* Stack */
.stk{display:flex;flex-direction:column-reverse;gap:8px;align-items:center}
.stk .node-box .ptr{right:-42px;top:50%;transform:translateY(-50%)}
.stk-base{width:130px;height:5px;border-radius:3px;background:var(--border2);margin-top:4px}

/* Queue / List (horizontal) */
.hrow{display:flex;align-items:center;gap:0;flex-wrap:wrap;justify-content:center}
.hrow .node-box{margin:0 2px}
.hrow .arrow{color:var(--text3);font-size:18px;margin:0 2px;align-self:center}
.hrow .node-box .ptr.top{top:-20px;left:50%;transform:translateX(-50%)}
.hrow .node-box .ptr.bot{bottom:-20px;left:50%;transform:translateX(-50%)}

/* Tree / Graph (svg) */
.svg-stage{width:100%;height:380px;display:block}
.svg-edge{stroke:var(--border2);stroke-width:2;transition:stroke .25s,stroke-width .25s}
.svg-edge.active{stroke:var(--gold);stroke-width:3.5}
.gnode circle{transition:fill .25s,stroke .25s}
.gnode text{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;pointer-events:none}
.frontier-row{margin-top:14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12px;color:var(--text3)}
.frontier-row .fr-label{font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:10px}
.fr-pill{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:3px 9px;color:var(--text2)}

/* Status */
.viz-status{margin-top:14px;min-height:38px;display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;color:var(--text2)}
.viz-status .vs-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;animation:st-pulse 1.4s infinite}
@keyframes st-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.viz-status .vs-counter{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);white-space:nowrap}

/* Ops toolbar */
.viz-ops{margin-top:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.op-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12.5px;color:var(--text);outline:none;font-family:'JetBrains Mono',monospace;transition:border .2s;width:88px}
.op-input.wide{width:200px;font-family:'Inter',sans-serif}
.op-input:focus{border-color:var(--blue)}
.op-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif}
.op-btn:hover{border-color:var(--blue);color:var(--blue)}
.op-btn.accent{background:var(--glow-blue);border-color:var(--blue);color:var(--blue)}
.op-btn.danger:hover{border-color:var(--rose);color:var(--rose)}
.op-sep{width:1px;height:22px;background:var(--border);margin:0 3px}
.op-label{font-size:11px;color:var(--text3);font-weight:600}

/* Player controls */
.viz-controls{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:11px 14px}
.pc-btn{background:var(--bg4);border:1px solid var(--border);border-radius:9px;width:38px;height:38px;display:grid;place-items:center;cursor:pointer;color:var(--text2);font-size:15px;transition:all .18s}
.pc-btn:hover{border-color:var(--blue);color:var(--blue)}
.pc-btn.play{width:46px;height:46px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;font-size:17px;box-shadow:0 4px 14px var(--glow-blue)}
.pc-btn.play:hover{transform:scale(1.05);color:#fff}

<script>
/* ════════════════════════════════════════════════════════════
   DSA ANIMATOR
   Single-file algorithm visualizer.
   Architecture: every animation is a list of immutable "steps".
   A small Player iterates the steps (play / pause / step / scrub /
   speed). Each visualizer supplies a render(step) function. This
   gives consistent controls across sorting, searching, structures,
   trees and graphs.
════════════════════════════════════════════════════════════ */
(function(){
'use strict';

/* ── tiny DOM helper ── */
function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function $(id){ return document.getElementById(id); }
function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function randArray(n){ const a=[]; for(let i=0;i<n;i++)a.push(randInt(6,99)); return a; }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ════════════════════════════════════════════════════════════
   CODE SNIPPETS  (referenced by step.line)
════════════════════════════════════════════════════════════ */
const CODE = {
  bubble:[
    "for (let i = 0; i < n - 1; i++) {",
    "  for (let j = 0; j < n-i-1; j++) {",
    "    if (a[j] > a[j + 1]) {",
    "      swap(a[j], a[j + 1]);",
    "    }",
    "  }",
    "}",
    "// array is sorted"
  ],
  selection:[
    "for (let i = 0; i < n - 1; i++) {",
    "  let min = i;",
    "  for (let j = i+1; j < n; j++)",
    "    if (a[j] < a[min]) min = j;",
    "  swap(a[i], a[min]);",
    "} // sorted"
  ],
  insertion:[
    "for (let i = 1; i < n; i++) {",
    "  let key = a[i], j = i - 1;",
    "  while (j >= 0 && a[j] > key) {",
    "    a[j + 1] = a[j]; j--;",
    "  }",
    "  a[j + 1] = key;",
    "} // sorted"
  ],
  merge:[
    "mergeSort(lo, hi) {",
    "  if (lo >= hi) return;",
    "  mid = (lo + hi) >> 1;",
    "  mergeSort(lo, mid);",
    "  mergeSort(mid + 1, hi);",
    "  merge(lo, mid, hi);",
    "  // compare & pick smaller",
    "  // write back to array",
    "}"
  ],
  quick:[
    "quickSort(lo, hi) {",
    "  if (lo >= hi) return;",
    "  pivot = a[hi]; i = lo;",
    "  for (j = lo; j < hi; j++)",
    "    if (a[j] < pivot) swap(i++, j);",
    "  swap(i, hi); // place pivot",
    "  recurse both halves",
    "}"
  ],
  heap:[
    "buildMaxHeap(a);",
    "heapify(n, i):",
    "  if (left  > largest) largest = l;",
    "  if (right > largest) largest = r;",
    "  if (largest != i) swap & recurse;",
    "for i = n-1..1:",
    "  swap(a[0], a[i]);",
    "  heapify(i, 0); // sorted"
  ],
  linear:[
    "for (let i = 0; i < n; i++)",
    "  if (a[i] === target) return i;",
    "return -1; // not found"
  ],
  binary:[
    "lo = 0; hi = n - 1;",
    "while (lo <= hi) {",
    "  mid = (lo + hi) >> 1;",
    "  if (a[mid] === target) return mid;",
    "  if (a[mid] < target) lo = mid + 1;",
    "  else hi = mid - 1;",
    "} return -1;"
  ],
  /* structure operation snippets (attached to steps via step.code) */
  stackPush:["push(x) {","  arr[top++] = x;","}"],
  stackPop:["pop() {","  return arr[--top];","}"],
  queueEnq:["enqueue(x) {","  arr[rear++] = x;","}"],
  queueDeq:["dequeue() {","  return arr[front++];","}"],
  listInsH:["insertHead(x) {","  node.next = head;","  head = node;","}"],
  listInsT:["insertTail(x) {","  while (cur.next) cur = cur.next;","  cur.next = node;","}"],
  listDel:["delete(x) {","  find node, relink","  prev.next = cur.next;","}"],
  listSearch:["search(x) {","  cur = head;","  while (cur && cur.val != x)","    cur = cur.next;","}"],
  bstInsert:["insert(x) {","  cur = root;","  if (x == cur.val) return;","  if (x < cur.val) go left;","    else attach left;","  if (x > cur.val) go right;","    else attach right;","}"],
  bstSearch:["search(x) {","  cur = root;","  while (cur) {","    if (x == cur.val) found;","    cur = x<cur.val ? cur.left : cur.right;","  }","}"],
  bstDelete:["delete(x) {","  locate node x","  0/1 child: relink","  2 children: inorder succ.","}"],
  bfs:["BFS(start) {","  q = [start]; visited = {start};","  while (q) { u = q.shift();","    for (v of adj[u])","      if (!visited[v]) q.push(v);","  }","}"],
  dfs:["DFS(u) {","  visited.add(u);","  for (v of adj[u])","    if (!visited[v]) DFS(v);","}"],
  traverse:["traverse(node) {","  // recurse subtrees in order","  visit(node);","}"]
};

/* ════════════════════════════════════════════════════════════
   SORTING / SEARCHING STEP GENERATORS
   Each returns an array of step objects. A step may carry:
   array, sorted[], cmp[], swap[], pivot, cur[], active[lo,hi],
   write, lo, hi, mid, cursor, found, allSorted, line, msg
════════════════════════════════════════════════════════════ */
function genBubble(arr){
  const A=arr.slice(), n=A.length, S=[], done=new Set();
  const add=o=>S.push(Object.assign({array:A.slice(),sorted:[...done]},o));
  add({line:0,msg:'Begin bubble sort'});
  for(let i=0;i<n-1;i++){
    for(let j=0;j<n-i-1;j++){
      add({line:2,cmp:[j,j+1],msg:`Compare ${A[j]} and ${A[j+1]}`});
      if(A[j]>A[j+1]){ [A[j],A[j+1]]=[A[j+1],A[j]]; add({line:3,swap:[j,j+1],msg:`Swap → ${A[j]}, ${A[j+1]}`}); }
    }
    done.add(n-1-i);
  }
  done.add(0);
  add({line:7,allSorted:true,msg:'Array fully sorted ✓'});
  return S;
}
function genSelection(arr){
  const A=arr.slice(), n=A.length, S=[], done=new Set();
  const add=o=>S.push(Object.assign({array:A.slice(),sorted:[...done]},o));
  add({line:0,msg:'Begin selection sort'});
  for(let i=0;i<n-1;i++){
    let min=i; add({line:1,cur:[min],msg:`Assume min = ${A[min]}`});
    for(let j=i+1;j<n;j++){
      add({line:2,cmp:[j],cur:[min],msg:`Is ${A[j]} < ${A[min]}?`});
      if(A[j]<A[min]){ min=j; add({line:3,cur:[min],msg:`New minimum ${A[min]}`}); }
    }
    if(min!==i){ [A[i],A[min]]=[A[min],A[i]]; add({line:4,swap:[i,min],msg:`Swap into position ${i}`}); }
    done.add(i);
  }
  done.add(n-1);
  add({line:5,allSorted:true,msg:'Array fully sorted ✓'});
  return S;
}
function genInsertion(arr){
  const A=arr.slice(), n=A.length, S=[], done=new Set([0]);
  const add=o=>S.push(Object.assign({array:A.slice(),sorted:[...done]},o));
  add({line:0,msg:'Begin insertion sort'});
  for(let i=1;i<n;i++){
    const key=A[i]; let j=i-1;
    add({line:1,cur:[i],msg:`Take key = ${key}`});
    while(j>=0 && A[j]>key){
      add({line:2,cmp:[j],cur:[j+1],msg:`${A[j]} > ${key}, shift right`});
      A[j+1]=A[j]; add({line:3,swap:[j,j+1]}); j--;
    }
    A[j+1]=key; for(let k=0;k<=i;k++)done.add(k);
    add({line:5,cur:[j+1],msg:`Insert ${key} at index ${j+1}`});
  }
  add({line:6,allSorted:true,msg:'Array fully sorted ✓'});
  return S;
}
function genMerge(arr){
  const A=arr.slice(), n=A.length, S=[], done=new Set();
  const add=o=>S.push(Object.assign({array:A.slice(),sorted:[...done]},o));
  add({line:0,msg:'Begin merge sort (divide & conquer)'});
  (function ms(lo,hi){
    if(lo>=hi)return;
    const mid=(lo+hi)>>1;
    add({line:2,active:[lo,hi],msg:`Divide [${lo}…${hi}] at ${mid}`});
    ms(lo,mid); ms(mid+1,hi);
    const tmp=[]; let i=lo,j=mid+1;
    add({line:5,active:[lo,hi],msg:`Merge [${lo}…${mid}] & [${mid+1}…${hi}]`});
    while(i<=mid&&j<=hi){
      add({line:6,active:[lo,hi],cmp:[i,j],msg:`Compare ${A[i]} & ${A[j]}`});
      if(A[i]<=A[j])tmp.push(A[i++]); else tmp.push(A[j++]);
    }
    while(i<=mid)tmp.push(A[i++]);
    while(j<=hi)tmp.push(A[j++]);
    for(let k=0;k<tmp.length;k++){ A[lo+k]=tmp[k]; add({line:7,active:[lo,hi],write:lo+k,msg:`Write ${tmp[k]} → index ${lo+k}`}); }
    if(lo===0&&hi===n-1)for(let k=0;k<n;k++)done.add(k);
  })(0,n-1);
  add({line:8,allSorted:true,msg:'Array fully sorted ✓'});
  return S;
}
function genQuick(arr){
  const A=arr.slice(), n=A.length, S=[], done=new Set();
  const add=o=>S.push(Object.assign({array:A.slice(),sorted:[...done]},o));
  add({line:0,msg:'Begin quick sort (Lomuto partition)'});
  (function qs(lo,hi){
    if(lo>hi)return;
    if(lo===hi){ done.add(lo); return; }
    const pivot=A[hi]; let i=lo;
    add({line:2,pivot:hi,cur:[i],msg:`Pivot = ${pivot}`});
    for(let j=lo;j<hi;j++){
      add({line:4,cmp:[j],pivot:hi,cur:[i],msg:`Is ${A[j]} < pivot ${pivot}?`});
      if(A[j]<pivot){ if(i!==j){ [A[i],A[j]]=[A[j],A[i]]; add({line:4,swap:[i,j],pivot:hi,msg:`Swap to left side`}); } i++; }
    }
    [A[i],A[hi]]=[A[hi],A[i]]; done.add(i);
    add({line:5,swap:[i,hi],msg:`Place pivot at index ${i}`});
    qs(lo,i-1); qs(i+1,hi);
  })(0,n-1);
  for(let k=0;k<n;k++)done.add(k);
  add({line:7,allSorted:true,msg:'Array fully sorted ✓'});
  return S;
}
function genHeap(arr){
  const A=arr.slice(), n=A.length, S=[], done=new Set();
  const add=o=>S.push(Object.assign({array:A.slice(),sorted:[...done]},o));
  function heapify(size,i){
    let largest=i; const l=2*i+1, r=2*i+2;
    if(l<size){ add({line:2,cmp:[l],cur:[largest],msg:`Compare child ${A[l]} with ${A[largest]}`}); if(A[l]>A[largest])largest=l; }
    if(r<size){ add({line:3,cmp:[r],cur:[largest],msg:`Compare child ${A[r]} with ${A[largest]}`}); if(A[r]>A[largest])largest=r; }
    if(largest!==i){ [A[i],A[largest]]=[A[largest],A[i]]; add({line:4,swap:[i,largest],msg:`Swap down`}); heapify(size,largest); }
  }
  add({line:0,msg:'Build max-heap'});
  for(let i=(n>>1)-1;i>=0;i--)heapify(n,i);
  add({line:5,msg:'Repeatedly extract the maximum'});
  for(let i=n-1;i>0;i--){
    [A[0],A[i]]=[A[i],A[0]]; done.add(i);
    add({line:6,swap:[0,i],msg:`Move max ${A[i]} to the end`});
    heapify(i,0);
  }
  done.add(0);
  add({line:7,allSorted:true,msg:'Array fully sorted ✓'});
  return S;
}
function genLinear(arr,target){
  const A=arr.slice(), n=A.length, S=[];
  const add=o=>S.push(Object.assign({array:A.slice()},o));
  add({line:0,cursor:0,msg:`Linear search for ${target}`});
  for(let i=0;i<n;i++){
    add({line:1,cursor:i,cmp:[i],msg:`Check index ${i}: ${A[i]}`});
    if(A[i]===target){ add({line:1,found:i,msg:`Found ${target} at index ${i} ✓`}); return S; }
  }
  add({line:2,cursor:n,msg:`${target} is not in the array`});
  return S;
}
function genBinary(arr,target){
  const A=arr.slice().sort((a,b)=>a-b), n=A.length, S=[];
  const add=o=>S.push(Object.assign({array:A.slice()},o));
  let lo=0,hi=n-1;
  add({line:0,lo,hi,msg:`Binary search for ${target} (array sorted)`});
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    add({line:2,lo,hi,mid,msg:`mid = ${mid} → ${A[mid]}`});
    if(A[mid]===target){ add({line:3,lo,hi,found:mid,msg:`Found ${target} at index ${mid} ✓`}); return S; }
    if(A[mid]<target){ add({line:4,lo,hi,mid,msg:`${A[mid]} < ${target} → search right`}); lo=mid+1; }
    else { add({line:5,lo,hi,mid,msg:`${A[mid]} > ${target} → search left`}); hi=mid-1; }
  }
  add({line:6,msg:`${target} is not in the array`});
  return S;
}

/* ════════════════════════════════════════════════════════════
   PLAYER  — drives any list of steps
════════════════════════════════════════════════════════════ */
const SPEED_DELAYS=[820,640,500,380,290,210,150,100,60,30]; // slider 1..10
class Player{
  constructor(){ this.steps=[]; this.i=0; this.playing=false; this.timer=null; this.delay=290; this.render=null; this.onUpdate=null; }
  setSteps(steps,autoplay){ this.pause(); this.steps=steps||[]; this.i=0; this._render(); if(autoplay&&this.steps.length>1)this.play(); }
  _render(){ if(this.render&&this.steps.length)this.render(this.steps[this.i]); if(this.onUpdate)this.onUpdate(this); }
  play(){ if(this.playing||this.steps.length<2)return; if(this.i>=this.steps.length-1)this.i=0; this.playing=true; if(this.onUpdate)this.onUpdate(this); this._tick(); }
  _tick(){ this.timer=setTimeout(()=>{ if(!this.playing)return;
      if(this.i<this.steps.length-1){ this.i++; this._render(); this._tick(); }
      else { this.playing=false; if(this.onUpdate)this.onUpdate(this); }
    }, this.delay); }
  pause(){ this.playing=false; clearTimeout(this.timer); if(this.onUpdate)this.onUpdate(this); }
  toggle(){ this.playing?this.pause():this.play(); }
  stepF(){ this.pause(); if(this.i<this.steps.length-1){ this.i++; this._render(); } }
  stepB(){ this.pause(); if(this.i>0){ this.i--; this._render(); } }
  reset(){ this.pause(); this.i=0; this._render(); }
  seek(v){ this.pause(); this.i=Math.max(0,Math.min(this.steps.length-1,v|0)); this._render(); }
  setSpeed(slider){ this.delay=SPEED_DELAYS[Math.max(0,Math.min(9,slider-1))]; }
}

/* — Bars (sorting + searching) — */
function buildBars(arr){
  VIZ.maxVal=Math.max.apply(null,arr.concat([1]));
  const s=stage(); s.className='viz-stage bars-stage'; s.innerHTML='';
  VIZ.bars=arr.map(v=>{
    const b=el('div','bar'); const lbl=el('span','bar-val',String(v)); b.appendChild(lbl);
    b.style.height=Math.max(4,v/VIZ.maxVal*100)+'%'; s.appendChild(b); return b;
  });
}
function renderBars(step){
  const sortedSet=new Set(step.sorted||[]), arr=step.array;
  VIZ.bars.forEach((bar,i)=>{
    if(i>=arr.length){ bar.style.display='none'; return; } bar.style.display='';
    const v=arr[i];
    bar.style.height=Math.max(4,v/VIZ.maxVal*100)+'%';
    bar.firstChild.textContent=v;
    const outRange = step.lo!==undefined && (i<step.lo||i>step.hi);
    let cls='bar';
    if(step.allSorted||sortedSet.has(i))cls+=' s-done';
    else if(step.found===i)cls+=' s-found';
    else if(step.mid===i)cls+=' s-cmp';
    else if(step.swap&&step.swap.indexOf(i)>-1)cls+=' s-swap';
    else if(step.write===i)cls+=' s-swap';
    else if(step.cmp&&step.cmp.indexOf(i)>-1)cls+=' s-cmp';
    else if(step.pivot===i)cls+=' s-pivot';
    else if(step.cur&&step.cur.indexOf(i)>-1)cls+=' s-cur';
    else if(step.cursor!==undefined&&i<step.cursor)cls+=' s-faded';
    else if(outRange)cls+=' s-faded';
    else if(step.active&&i>=step.active[0]&&i<=step.active[1])cls+=' s-active';
    if(step.lo===i||step.hi===i)cls+=' s-bound';
    bar.className=cls;
  });
}

/* — Tree (BST) — */
function renderTree(step){

/* — Graph — */
function renderGraph(step){
  const s=stage(); s.className='viz-stage'; const g=VIZ.model;
  if(!g){ s.innerHTML='<div class="empty-note">No graph</div>'; return; }
  const W=s.clientWidth||640, H=360, pad=40;
  const X=x=>pad+x*(W-2*pad), Y=y=>pad+y*(H-2*pad);
  const visited=new Set(step.visited||[]), current=step.current, frontier=step.frontier||[];
  let svg=`<svg class="svg-stage" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  g.edges.forEach(([a,b])=>{
    const na=g.nodes[a], nb=g.nodes[b];
    const act = step.edge && ((step.edge[0]===a&&step.edge[1]===b)||(step.edge[0]===b&&step.edge[1]===a));
    svg+=`<line class="svg-edge${act?' active':''}" x1="${X(na.x)}" y1="${Y(na.y)}" x2="${X(nb.x)}" y2="${Y(nb.y)}"/>`;
  });
  g.nodes.forEach((n,id)=>{
    let fill='var(--bg4)',stroke='var(--border2)',tc='var(--text)';
    if(id===current){fill='rgba(245,158,11,.2)';stroke='var(--gold)';tc='var(--gold)';}
    else if(visited.has(id)){fill='rgba(6,214,160,.16)';stroke='var(--teal)';tc='var(--teal)';}
    else if(frontier.indexOf(id)>-1){fill='rgba(79,142,247,.16)';stroke='var(--blue)';tc='var(--blue)';}
    svg+=`<g class="gnode"><circle cx="${X(n.x)}" cy="${Y(n.y)}" r="18" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/><text x="${X(n.x)}" y="${Y(n.y)+4.5}" text-anchor="middle" fill="${tc}">${id}</text></g>`;
  });

  if(step.order&&step.order.length)extra+=`<span class="fr-label" style="margin-left:12px">Visited</span><span class="fr-pill">${step.order.join(' → ')}</span>`;
  extra+='</div>';
  s.innerHTML=svg+extra;
}

/* Stack */
function opStackPush(v){ const a=VIZ.model, S=[]; S.push({array:a.slice(),line:0,msg:`push(${v})`,code:CODE.stackPush}); a.push(v); S.push({array:a.slice(),hi:a.length-1,type:'add',line:1,msg:`Pushed ${v} on top`,code:CODE.stackPush}); return S; }
function opStackPop(){ const a=VIZ.model, S=[]; if(!a.length){ return [{array:[],msg:'Stack is empty — nothing to pop',code:CODE.stackPop,line:0}]; } S.push({array:a.slice(),hi:a.length-1,type:'rm',line:0,msg:`Remove top ${a[a.length-1]}`,code:CODE.stackPop}); const v=a.pop(); S.push({array:a.slice(),line:1,msg:`Popped ${v}`,code:CODE.stackPop}); return S; }
function opStackPeek(){ const a=VIZ.model; if(!a.length)return [{array:[],msg:'Stack is empty',code:CODE.stackPop,line:0}]; return [{array:a.slice(),hi:a.length-1,type:'peek',msg:`Top of stack = ${a[a.length-1]}`,code:CODE.stackPop,line:0}]; }
/* Queue */
function opQueueEnq(v){ const a=VIZ.model,S=[]; S.push({array:a.slice(),line:0,msg:`enqueue(${v})`,code:CODE.queueEnq}); a.push(v); S.push({array:a.slice(),hi:a.length-1,type:'add',line:1,msg:`Added ${v} at rear`,code:CODE.queueEnq}); return S; }
function opQueueDeq(){ const a=VIZ.model,S=[]; if(!a.length)return [{array:[],msg:'Queue is empty — nothing to dequeue',code:CODE.queueDeq,line:0}]; S.push({array:a.slice(),hi:0,type:'rm',line:0,msg:`Remove front ${a[0]}`,code:CODE.queueDeq}); const v=a.shift(); S.push({array:a.slice(),line:1,msg:`Dequeued ${v}`,code:CODE.queueDeq}); return S; }
function opQueuePeek(){ const a=VIZ.model; if(!a.length)return [{array:[],msg:'Queue is empty',code:CODE.queueDeq,line:0}]; return [{array:a.slice(),hi:0,type:'peek',msg:`Front of queue = ${a[0]}`,code:CODE.queueDeq,line:0}]; }
/* Linked list */
function opListInsHead(v){ const a=VIZ.model,S=[]; S.push({array:a.slice(),line:1,msg:`New node ${v} → head`,code:CODE.listInsH}); a.unshift(v); S.push({array:a.slice(),hi:0,type:'add',line:2,msg:`${v} is the new head`,code:CODE.listInsH}); return S; }
function opListInsTail(v){ const a=VIZ.model,S=[]; if(a.length)for(let i=0;i<a.length;i++)S.push({array:a.slice(),hi:i,type:'visit',line:1,msg:`Traverse to tail (${a[i]})`,code:CODE.listInsT}); a.push(v); S.push({array:a.slice(),hi:a.length-1,type:'add',line:2,msg:`Linked ${v} at tail`,code:CODE.listInsT}); return S; }
function opListDelete(v){ const a=VIZ.model,S=[]; const idx=a.indexOf(v);
  for(let i=0;i<a.length;i++){ S.push({array:a.slice(),hi:i,type:'visit',line:1,msg:`Looking for ${v} (at ${a[i]})`,code:CODE.listDel}); if(a[i]===v)break; }
  if(idx===-1){ S.push({array:a.slice(),msg:`${v} not found in list`,code:CODE.listDel,line:1}); return S; }
  S.push({array:a.slice(),hi:idx,type:'rm',line:2,msg:`Relink around ${v}`,code:CODE.listDel}); a.splice(idx,1); S.push({array:a.slice(),line:2,msg:`Deleted ${v}`,code:CODE.listDel}); return S; }
function opListSearch(v){ const a=VIZ.model,S=[]; for(let i=0;i<a.length;i++){ const found=a[i]===v; S.push({array:a.slice(),hi:i,type:found?'found':'visit',line:found?0:2,msg:found?`Found ${v} at position ${i} ✓`:`Check ${a[i]}`,code:CODE.listSearch}); if(found)return S; } S.push({array:a.slice(),msg:`${v} not found`,code:CODE.listSearch,line:2}); return S; }

/* BST helpers */
function serializeTree(root){
  const nodes=[], edges=[]; let order=0;
  (function rec(node,depth){ if(!node)return; rec(node.left,depth+1); node._o=order++; nodes.push({val:node.val,depth,order:node._o}); if(node.left)edges.push([node.val,node.left.val]); if(node.right)edges.push([node.val,node.right.val]); })(root,0);
  return {nodes,edges,count:order};
}
function opBstInsert(v){
  const S=[]; const snap=(hi,line,msg)=>S.push({tree:serializeTree(VIZ.model.tree),hi:hi||{},line,msg,code:CODE.bstInsert});
  if(!VIZ.model.tree){ VIZ.model.tree={val:v,left:null,right:null}; snap({[v]:'add'},0,`Insert ${v} as root`); return S; }
  let cur=VIZ.model.tree;
  snap({[cur.val]:'visit'},1,`Start at root ${cur.val}`);
  while(true){
    if(v===cur.val){ snap({[cur.val]:'found'},2,`${v} already exists`); return S; }
    if(v<cur.val){ if(!cur.left){ cur.left={val:v,left:null,right:null}; snap({[v]:'add'},4,`${v} < ${cur.val} → insert left`); return S; } cur=cur.left; snap({[cur.val]:'visit'},3,`${v} < parent → go left to ${cur.val}`); }
    else { if(!cur.right){ cur.right={val:v,left:null,right:null}; snap({[v]:'add'},6,`${v} > ${cur.val} → insert right`); return S; } cur=cur.right; snap({[cur.val]:'visit'},5,`${v} > parent → go right to ${cur.val}`); }
  }
}
function opBstSearch(v){
  const S=[]; const snap=(hi,line,msg)=>S.push({tree:serializeTree(VIZ.model.tree),hi:hi||{},line,msg,code:CODE.bstSearch});
  let cur=VIZ.model.tree;
  if(!cur){ return [{tree:{nodes:[],edges:[],count:0},msg:'Tree is empty',code:CODE.bstSearch,line:0}]; }
  while(cur){
    if(v===cur.val){ snap({[cur.val]:'found'},3,`Found ${v} ✓`); return S; }
    snap({[cur.val]:'visit'},4,`${v} ${v<cur.val?'<':'>'} ${cur.val} → go ${v<cur.val?'left':'right'}`);
    cur = v<cur.val ? cur.left : cur.right;
  }
  snap({},2,`${v} not found`); return S;
}
function bstDeleteNode(root,v){
  if(!root)return null;
  if(v<root.val)root.left=bstDeleteNode(root.left,v);
  else if(v>root.val)root.right=bstDeleteNode(root.right,v);
  else{
    if(!root.left)return root.right;
    if(!root.right)return root.left;
    let succ=root.right; while(succ.left)succ=succ.left;
    root.val=succ.val; root.right=bstDeleteNode(root.right,succ.val);
  }
  return root;
}
function opBstDelete(v){
  const S=[]; const snap=(hi,line,msg)=>S.push({tree:serializeTree(VIZ.model.tree),hi:hi||{},line,msg,code:CODE.bstDelete});
  let cur=VIZ.model.tree, exists=false;
  while(cur){ if(cur.val===v){exists=true;snap({[v]:'rm'},1,`Located ${v}`);break;} snap({[cur.val]:'visit'},1,`Searching for ${v}`); cur=v<cur.val?cur.left:cur.right; }
  if(!exists){ snap({},1,`${v} not found`); return S; }
  VIZ.model.tree=bstDeleteNode(VIZ.model.tree,v);
  snap({},3,`Deleted ${v} (tree rebalanced by structure)`); return S;
}
function opBstTraverse(kind){
  const order=[]; const root=VIZ.model.tree;
  const recIn=n=>{ if(!n)return; recIn(n.left); order.push(n.val); recIn(n.right); };
  const recPre=n=>{ if(!n)return; order.push(n.val); recPre(n.left); recPre(n.right); };
  const recPost=n=>{ if(!n)return; recPost(n.left); recPost(n.right); order.push(n.val); };
  if(kind==='level'){ const q=root?[root]:[]; while(q.length){ const x=q.shift(); order.push(x.val); if(x.left)q.push(x.left); if(x.right)q.push(x.right); } }
  else if(kind==='preorder')recPre(root); else if(kind==='postorder')recPost(root); else recIn(root);
  const ser=serializeTree(root); const S=[]; const visited=[];
  const codeFor=()=>['Traversal order:', '  '+(order.length?order.join(' → '):'(empty)')];
  S.push({tree:ser,hi:{},line:0,msg:`${kind} traversal`,code:codeFor()});
  order.forEach(val=>{ visited.push(val); const hi={}; visited.forEach(x=>hi[x]='done'); hi[val]='current'; S.push({tree:ser,hi,line:1,msg:`Visit ${val}`,code:codeFor()}); });
  const fin={}; order.forEach(x=>fin[x]='done'); S.push({tree:ser,hi:fin,line:2,msg:`${kind}: ${order.join(' → ')||'∅'}`,code:codeFor()});
  return S;
}

/* Graph helpers */
function makeGraph(n){
  n=n||7; const nodes=[];
  for(let i=0;i<n;i++){ const ang=2*Math.PI*i/n - Math.PI/2; nodes.push({x:0.5+0.4*Math.cos(ang), y:0.5+0.42*Math.sin(ang)}); }
  const edges=[], adj=Array.from({length:n},()=>[]);
  const add=(a,b)=>{ if(a!==b&&adj[a].indexOf(b)<0){ adj[a].push(b); adj[b].push(a); edges.push([a,b]); } };
  for(let i=1;i<n;i++)add(i,randInt(0,i-1));            // spanning tree → connected
  let extra=Math.max(2,Math.round(n*0.5)); while(extra-- > 0)add(randInt(0,n-1),randInt(0,n-1));
  adj.forEach(l=>l.sort((a,b)=>a-b));
  return {nodes,edges,adj,n};
}
function genBFS(g,start){
  const S=[], visited=new Set([start]), q=[start], order=[];
  const snap=o=>S.push(Object.assign({visited:[...visited],frontier:[...q],order:[...order]},o,{code:CODE.bfs}));
  snap({current:start,line:0,msg:`Start BFS at node ${start}`});
  while(q.length){
    const u=q.shift(); order.push(u);
    snap({current:u,line:1,msg:`Dequeue & visit ${u}`});
    for(const v of g.adj[u]){
      snap({current:u,edge:[u,v],line:3,msg:`Inspect edge ${u}–${v}`});
      if(!visited.has(v)){ visited.add(v); q.push(v); snap({current:u,edge:[u,v],line:4,msg:`Enqueue ${v}`}); }
    }
  }
  snap({line:6,done:true,msg:`BFS order: ${order.join(' → ')}`});
  return S;
}
function genDFS(g,start){
  const S=[], visited=new Set(), order=[], st=[];
  const snap=o=>S.push(Object.assign({visited:[...visited],frontier:[...st],order:[...order]},o,{code:CODE.dfs}));
  snap({current:start,line:0,msg:`Start DFS at node ${start}`});
  (function go(u){
    visited.add(u); order.push(u); st.push(u);
    snap({current:u,line:1,msg:`Visit ${u}`});
    for(const v of g.adj[u]){
      snap({current:u,edge:[u,v],line:2,msg:`Inspect edge ${u}–${v}`});
      if(!visited.has(v)){ snap({current:u,edge:[u,v],line:3,msg:`Recurse into ${v}`}); go(v); snap({current:u,line:2,msg:`Backtrack to ${u}`}); }
    }
    st.pop();
  })(start);
  snap({line:4,done:true,msg:`DFS order: ${order.join(' → ')}`});
  return S;
}

/* ════════════════════════════════════════════════════════════
   EXTENDED VISUALIZERS — original implementations
   Binary heap · AVL tree · Dijkstra · pathfinding grid ·
   recursion tree · Tower of Hanoi · DP tables (1-D & 2-D)
════════════════════════════════════════════════════════════ */
Object.assign(CODE,{
  heapIns:["insert(x):","  heap.push(x); i = size - 1;","  while (i>0 && heap[i] < heap[parent(i)])","    swap(i, parent(i)); i = parent(i);"],
  heapExt:["extractMin():","  min = heap[0];","  heap[0] = heap.pop();","  siftDown(0);   // restore heap","  return min;"],
  avlIns:["insert(x):","  bst-insert, remember path","  update heights up the path","  if |balance| > 1: rotate","  // LL · RR · LR · RL → balanced"],
  dijkstra:["dist[src] = 0;","while unvisited remain:","  u = unvisited node with min dist","  for (v, w) in adj[u]:","    if dist[u] + w < dist[v]:","      dist[v] = dist[u] + w;"],
  grid:["BFS shortest path:","  q = [start]; visited = {start}","  u = q.shift();  // expand frontier","  reconstruct path via parents","  // 4-directional neighbours","  // no path if target unreached"],
  rectree:["fib(n):","  if (n < 2) return n;","  return fib(n-1) + fib(n-2);"],
  hanoi:["hanoi(n, from, to, via):","  if (n === 0) return;","  hanoi(n-1, from, via, to);","  move disk from → to;","  hanoi(n-1, via, to, from);"],
  dp1:["dp[0] = 0; dp[1] = 1;","for (i = 2; i <= n; i++)","  dp[i] = dp[i-1] + dp[i-2];"],

/* ── Binary min-heap (array-backed complete tree) ── */
function opHeapInsert(v){
  const h=VIZ.model, S=[]; const snap=(hi,line,msg)=>S.push({heap:h.slice(),hi:hi||{},line,msg,code:CODE.heapIns});
  h.push(v); let i=h.length-1; snap({[i]:'add'},1,`Add ${v} at the end (index ${i})`);
  while(i>0){ const p=(i-1)>>1; snap({[i]:'current',[p]:'visit'},2,`Compare ${h[i]} with parent ${h[p]}`);
    if(h[i]<h[p]){ [h[i],h[p]]=[h[p],h[i]]; snap({[p]:'add',[i]:'visit'},3,`${h[p]} < parent → sift up`); i=p; } else break; }
  snap({[i]:'done'},0,`${v} settled — heap property holds`); return S;
}
function opHeapExtract(){
  const h=VIZ.model, S=[]; const snap=(hi,line,msg)=>S.push({heap:h.slice(),hi:hi||{},line,msg,code:CODE.heapExt});
  if(!h.length)return [{heap:[],hi:{},msg:'Heap is empty — nothing to extract',code:CODE.heapExt,line:0}];

      if(s!==i){ [h[i],h[s]]=[h[s],h[i]]; snap({[s]:'add'},3,`Sift down`); i=s; } else break;
    }

}

/* ── AVL tree (self-balancing BST, iterative insert w/ rotations) ── */
function avlH(n){ return n?n.h:0; }
function avlBF(n){ return n?avlH(n.left)-avlH(n.right):0; }
function avlUpd(n){ n.h=1+Math.max(avlH(n.left),avlH(n.right)); }
function avlRotR(y){ const x=y.left; y.left=x.right; x.right=y; avlUpd(y); avlUpd(x); return x; }
function avlRotL(x){ const y=x.right; x.right=y.left; y.left=x; avlUpd(x); avlUpd(y); return y; }
function opAvlInsert(v){
  const S=[]; const snap=(hi,line,msg)=>S.push({tree:serializeTree(VIZ.model.tree||null),hi:hi||{},line,msg,code:CODE.avlIns});
  if(!VIZ.model.tree){ VIZ.model.tree={val:v,left:null,right:null,h:1}; snap({[v]:'add'},0,`Insert ${v} as root`); return S; }
  const stack=[]; let cur=VIZ.model.tree;
  while(cur){ stack.push(cur);
    if(v===cur.val){ snap({[cur.val]:'found'},1,`${v} already exists`); return S; }
    snap({[cur.val]:'visit'},1,`${v} ${v<cur.val?'<':'>'} ${cur.val} → go ${v<cur.val?'left':'right'}`);
    if(v<cur.val){ if(!cur.left){ cur.left={val:v,left:null,right:null,h:1}; break; } cur=cur.left; }
    else { if(!cur.right){ cur.right={val:v,left:null,right:null,h:1}; break; } cur=cur.right; }
  }
  snap({[v]:'add'},2,`Inserted ${v}`);
  for(let i=stack.length-1;i>=0;i--){
    const node=stack[i], parent=stack[i-1]||null;
    avlUpd(node); const bf=avlBF(node); let sub=node;
    if(bf>1 && v<node.left.val)sub=avlRotR(node);              // LL
    else if(bf<-1 && v>node.right.val)sub=avlRotL(node);        // RR
    else if(bf>1 && v>node.left.val){ node.left=avlRotL(node.left); sub=avlRotR(node); }  // LR
    else if(bf<-1 && v<node.right.val){ node.right=avlRotR(node.right); sub=avlRotL(node); } // RL
    if(sub!==node){ if(!parent)VIZ.model.tree=sub; else if(parent.left===node)parent.left=sub; else parent.right=sub;
      snap({[sub.val]:'add'},3,`Rotate to rebalance at ${node.val} (balance ${bf})`); }
  }
  snap({},4,`AVL height-balanced ✓`); return S;
}

/* ── Dijkstra on a weighted graph ── */
function makeWeightedGraph(n){
  n=n||6; const nodes=[]; for(let i=0;i<n;i++){ const a=2*Math.PI*i/n-Math.PI/2; nodes.push({x:0.5+0.4*Math.cos(a), y:0.5+0.42*Math.sin(a)}); }
  const edges=[], adj=Array.from({length:n},()=>[]);
  const add=(a,b)=>{ if(a!==b && !adj[a].some(e=>e.to===b)){ const w=randInt(1,9); adj[a].push({to:b,w}); adj[b].push({to:a,w}); edges.push([a,b,w]); } };
  for(let i=1;i<n;i++)add(i,randInt(0,i-1));

  return {nodes,edges,adj,n};
}
function genDijkstra(g,src){
  const n=g.n, dist=Array(n).fill(Infinity), done=new Set(); dist[src]=0; const S=[];
  const snap=o=>S.push(Object.assign({dist:dist.slice(),visited:[...done]},o,{code:CODE.dijkstra}));
  snap({current:src,line:0,msg:`Source ${src}: dist = 0, others ∞`});
  for(let it=0;it<n;it++){
    let u=-1,best=Infinity; for(let i=0;i<n;i++)if(!done.has(i)&&dist[i]<best){ best=dist[i]; u=i; }
    if(u<0)break; done.add(u);
    snap({current:u,line:2,msg:`Pick closest unvisited node ${u} (dist ${dist[u]})`});
    for(const {to,w} of g.adj[u]){
      snap({current:u,edge:[u,to],line:3,msg:`Relax edge ${u}→${to} (weight ${w})`});
      if(dist[u]+w<dist[to]){ dist[to]=dist[u]+w; snap({current:u,edge:[u,to],line:5,msg:`Better path: dist[${to}] = ${dist[to]}`}); }
    }
  }
  snap({line:1,done:true,msg:`Done · distances: [${dist.map(d=>d===Infinity?'∞':d).join(', ')}]`});
  return S;
}

    svg+=`<line class="svg-edge${act?' active':''}" x1="${X(na.x)}" y1="${Y(na.y)}" x2="${X(nb.x)}" y2="${Y(nb.y)}"/>`;
    svg+=`<circle cx="${mx}" cy="${my}" r="9" fill="var(--bg2)" stroke="var(--border)"/><text x="${mx}" y="${my+3.5}" text-anchor="middle" font-size="10" font-family="JetBrains Mono,monospace" fill="var(--text2)">${w}</text>`;
  });

/* ── Pathfinding on a grid (BFS shortest path) ── */
function makeGrid(rows,cols){
  rows=rows||11; cols=cols||21; const walls=new Set();
  const start=[Math.floor(rows/2),1], end=[Math.floor(rows/2),cols-2];
  const sk=start[0]+','+start[1], ek=end[0]+','+end[1];
  const target=Math.floor(rows*cols*0.25);
  for(let i=0;i<target;i++){ const r=randInt(0,rows-1), c=randInt(0,cols-1), k=r+','+c; if(k===sk||k===ek)continue; walls.add(k); }
  return {rows,cols,start,end,walls};
}
function genGridBFS(G){
  const {rows,cols,start,end,walls}=G; const S=[];
  const key=(r,c)=>r+','+c, inB=(r,c)=>r>=0&&c>=0&&r<rows&&c<cols&&!walls.has(key(r,c));
  const visited=new Set(), prev={}, q=[start]; visited.add(key(start[0],start[1]));
  const snap=o=>S.push(Object.assign({visited:[...visited],frontier:q.map(x=>key(x[0],x[1])),path:[]},o,{code:CODE.grid}));
  snap({current:key(start[0],start[1]),line:1,msg:'Begin BFS from the start cell'});
  let found=false;
  while(q.length&&!found){
    const [r,c]=q.shift();
    if(r===end[0]&&c===end[1]){ found=true; break; }
    for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nr=r+dr,nc=c+dc,k=key(nr,nc);
      if(inB(nr,nc)&&!visited.has(k)){ visited.add(k); prev[k]=key(r,c); q.push([nr,nc]); } }
    snap({current:key(r,c),line:2,msg:`Expand cell (${r}, ${c})`});
  }
  const path=[]; let ck=key(end[0],end[1]);
  if(visited.has(ck)){ while(ck){ path.push(ck); if(ck===key(start[0],start[1]))break; ck=prev[ck]; } }
  const rev=path.reverse();
  for(let i=0;i<rev.length;i++)S.push({visited:[...visited],frontier:[],path:rev.slice(0,i+1),current:rev[i],line:3,msg:`Trace path · cell ${i+1}/${rev.length}`,code:CODE.grid});
  if(!rev.length)S.push({visited:[...visited],frontier:[],path:[],line:5,msg:'No path — target is walled off',code:CODE.grid});
  else S.push({visited:[...visited],frontier:[],path:rev,line:3,msg:`Shortest path found · ${rev.length} cells`,code:CODE.grid});
  return S;
}
function renderGrid(step){
  const s=stage(); s.className='viz-stage'; const G=VIZ.model; if(!G){ s.innerHTML=''; return; }
  const {rows,cols,start,end,walls}=G;
  const visited=new Set(step.visited||[]), frontier=new Set(step.frontier||[]), path=new Set(step.path||[]);
  const sk=start[0]+','+start[1], ek=end[0]+','+end[1];
  let h=`<div class="pf-hint">🟢 start · 🔴 target · click cells to toggle walls (before running)</div><div class="pf-grid" id="pfGrid" style="grid-template-columns:repeat(${cols},26px)">`;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ const k=r+','+c; let cls='pf-cell';
    if(k===sk)cls+=' start'; else if(k===ek)cls+=' end'; else if(walls.has(k))cls+=' wall';
    else if(path.has(k))cls+=' path'; else if(step.current===k)cls+=' frontier'; else if(visited.has(k))cls+=' visited'; else if(frontier.has(k))cls+=' frontier';
    h+=`<div class="${cls}" data-k="${k}"></div>`;
  }
  h+='</div>'; s.innerHTML=h;
  const grid=$('pfGrid');
  if(grid)grid.onclick=e=>{ if(VIZ.player.steps.length>1)return;   // only editable before a run
    const cell=e.target.closest('.pf-cell'); if(!cell)return; const k=cell.dataset.k; if(k===sk||k===ek)return;
    if(walls.has(k))walls.delete(k); else walls.add(k); VIZ.player._render(); };
}

/* ── Fibonacci recursion call tree ── */
function genFibTree(n){
  let id=0; const nodes=[], evts=[];
  (function build(k,depth,parent){ const me={id:id++,k,depth,parent,kids:[]}; nodes.push(me); if(parent!=null)nodes[parent].kids.push(me.id);
    evts.push({a:me.id,call:true});
    if(k<2){ evts.push({a:me.id,ret:k}); return k; }
    const x=build(k-1,depth+1,me.id), y=build(k-2,depth+1,me.id), val=x+y;
    evts.push({a:me.id,ret:val}); return val;
  })(n,0,null);

  const maxX=Math.max(1,ord-1), maxDepth=Math.max(...nodes.map(nd=>nd.depth));

  const push=(active,line,msg)=>frames.push({nodes,maxDepth,visible:[...visible],valMap:Object.assign({},valMap),done:[...done],active,line,msg,code:CODE.rectree});
  push(-1,0,`Compute fib(${n}) — naive recursion`);

    if(e.call){ visible.add(e.a); push(e.a,nd.k<2?1:2,`Call fib(${nd.k})`); }
    else { valMap[e.a]=e.ret; done.add(e.a); push(e.a,nd.k<2?1:2,`fib(${nd.k}) returns ${e.ret}`); } });

/* ── Tower of Hanoi ── */
function genHanoi(n){
  const pegs=[[],[],[]]; for(let d=n;d>=1;d--)pegs[0].push(d); const S=[]; let moves=0;
  const snap=(hi,line,msg)=>S.push({pegs:pegs.map(p=>p.slice()),hi:hi||null,n,line,msg,moves,code:CODE.hanoi});

    const disk=pegs[from].pop(); pegs[to].push(disk); moves++;
    snap({peg:to,disk},3,`Move disk ${disk}: ${['A','B','C'][from]} → ${['A','B','C'][to]}`);
    move(d-1,via,to,from); })(n,0,2,1);
  snap(null,1,`Solved in ${moves} moves (optimal = 2ⁿ−1 = ${(1<<n)-1})`); return S;

/* ── Fibonacci dynamic-programming table (1-D) ── */

/* ── Longest Common Subsequence dynamic-programming table (2-D) ── */
function genLCS(a,b){
  const m=a.length, nn=b.length, dp=Array.from({length:m+1},()=>Array(nn+1).fill(0)), S=[];

  S.push({dp:dp.map(r=>r.slice()),a,b,filled:[...filled],line:0,msg:`LCS of "${a}" and "${b}" — base row/col are 0`,code:CODE.dp2});
  for(let i=1;i<=m;i++)for(let j=1;j<=nn;j++){
    if(a[i-1]===b[j-1]){ S.push({dp:dp.map(r=>r.slice()),a,b,filled:[...filled],cur:[i,j],dep:[[i-1,j-1]],line:2,msg:`'${a[i-1]}' = '${b[j-1]}' → dp[${i}][${j}] = dp[${i-1}][${j-1}] + 1`,code:CODE.dp2}); dp[i][j]=dp[i-1][j-1]+1; }
    else { S.push({dp:dp.map(r=>r.slice()),a,b,filled:[...filled],cur:[i,j],dep:[[i-1,j],[i,j-1]],line:4,msg:`'${a[i-1]}' ≠ '${b[j-1]}' → max(up, left)`,code:CODE.dp2}); dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]); }
    filled.add(i+','+j);
  }
  let i=m,j=nn; const path=new Set(), lcs=[];
  while(i>0&&j>0){ if(a[i-1]===b[j-1]){ path.add(i+','+j); lcs.push(a[i-1]); i--; j--; } else if(dp[i-1][j]>=dp[i][j-1])i--; else j--; }
  S.push({dp:dp.map(r=>r.slice()),a,b,filled:[...filled],path:[...path],done:true,line:1,msg:`LCS = "${lcs.reverse().join('')}" (length ${dp[m][nn]})`,code:CODE.dp2});
  return S;
}
function renderDP2(step){
  const s=stage(); s.className='viz-stage'; const dp=step.dp;
  if(!dp){ s.innerHTML='<div class="empty-note">'+escapeHtml(step.msg||'Enter two strings and press Run')+'</div>'; return; }
  const a=step.a||'', b=step.b||'', filled=new Set(step.filled||[]), path=new Set(step.path||[]);
  const cur=step.cur, depSet=new Set((step.dep||[]).map(d=>d[0]+','+d[1]));
  let h='<div class="dp-scroll"><table class="dp-table"><tr><th></th><th>∅</th>'+[...b].map(ch=>`<th>${escapeHtml(ch)}</th>`).join('')+'</tr>';
  for(let i=0;i<dp.length;i++){
    h+='<tr><th>'+(i===0?'∅':escapeHtml(a[i-1]))+'</th>';
    for(let j=0;j<dp[i].length;j++){ const k=i+','+j; let cls='dp-cell'; if(filled.has(k))cls+=' filled';
      if(cur&&cur[0]===i&&cur[1]===j)cls+=' cur'; else if(path.has(k))cls+=' path'; else if(depSet.has(k))cls+=' dep';
      h+=`<td class="${cls}">${filled.has(k)?dp[i][j]:'·'}</td>`; }
    h+='</tr>';
  }
  h+='</table></div>'; s.innerHTML=h;
}

function parseQuery(q){ const o={}; (q||'').split('&').forEach(p=>{ if(!p)return; const idx=p.indexOf('='); const k=idx<0?p:p.slice(0,idx), v=idx<0?'':p.slice(idx+1); o[decodeURIComponent(k)]=decodeURIComponent(v); }); return o; }
function currentParams(){
  const a=VIZ.algo; if(!a)return {}; const p={};
  if(a.kind==='sort' && VIZ.arr)p.a=VIZ.arr.join('-');
  else if(a.kind==='search' && VIZ.arr){ p.a=VIZ.arr.join('-'); if(VIZ.target!=null)p.t=VIZ.target; }
  else if(a.struct==='rectree'||a.struct==='hanoi'||a.struct==='dp1'){ const n=$('opN'); if(n)p.n=n.value; }
  else if(a.struct==='dp2'){ const x=$('opA'),y=$('opB'); if(x)p.a=x.value; if(y)p.b=y.value; }
  return p;
}
function buildShareUrl(){
  const p=currentParams(); const qs=Object.keys(p).map(k=>k+'='+encodeURIComponent(p[k])).join('&');

}
function applyShareParams(algo,params){
  if(!params)return;
  if(algo.kind==='sort' && params.a){ const nums=params.a.split(/[-,\s]+/).map(Number).filter(x=>!isNaN(x)&&x>0).slice(0,28); if(nums.length>1){ VIZ.barCount=nums.length; loadSortSteps(algo,nums); } }
  else if(algo.kind==='search'){ if(params.a){ const nums=params.a.split(/[-,\s]+/).map(Number).filter(x=>!isNaN(x)&&x>0); if(nums.length>1)VIZ.arr=nums; } if(params.t&&$('opTarget'))$('opTarget').value=params.t; if(params.a||params.t)loadSearchSteps(algo,false); }
  else if((algo.struct==='rectree'||algo.struct==='hanoi'||algo.struct==='dp1')&&params.n&&$('opN'))$('opN').value=params.n;
  else if(algo.struct==='dp2'){ if(params.a&&$('opA'))$('opA').value=params.a; if(params.b&&$('opB'))$('opB').value=params.b; }
}

    dp1:renderDP1, dp2:renderDP2, stack:renderStack, queue:renderQueue, list:renderList };

    case 'graph': VIZ.model=makeGraph(7); VIZ.player.setSteps([{visited:[],frontier:[],order:[],msg:'Choose a start node and press Run',code:CODE[algo.mode],line:0}],false); break;
    case 'dijkstra': VIZ.model=makeWeightedGraph(6); VIZ.player.setSteps([{dist:[],visited:[],msg:'Choose a source and press Run',code:CODE.dijkstra,line:0}],false); break;
    case 'grid': VIZ.model=makeGrid(); VIZ.player.setSteps([{visited:[],frontier:[],path:[],msg:'Edit walls, then press Run to find the shortest path',code:CODE.grid,line:0}],false); break;
    case 'heap': VIZ.model=[]; [4,9,2,7,1,5].forEach(x=>opHeapInsert(x)); VIZ.player.setSteps([{heap:VIZ.model.slice(),hi:{},msg:'Min-heap — insert values or extract the minimum',code:CODE.heapIns,line:0}],false); break;

    case 'rectree': VIZ.player.setSteps([{nodes:null,msg:'Choose n and press Visualize',code:CODE.rectree,line:0}],false); break;
    case 'hanoi': VIZ.player.setSteps([{pegs:null,msg:'Choose disk count and press Solve',code:CODE.hanoi,line:0}],false); break;

  const add=node=>ops.appendChild(node);
  const btn=(label,fn,cls)=>{ const b=el('button','op-btn'+(cls?' '+cls:''),label); b.addEventListener('click',fn); return b; };
  const valInput=(ph)=>{ const i=el('input','op-input'); i.id='opVal'; i.placeholder=ph||'value'; i.type='number'; i.addEventListener('keydown',e=>{if(e.key==='Enter')ops.querySelector('.op-btn.accent')&&ops.querySelector('.op-btn.accent').click();}); return i; };
  const readVal=()=>{ const i=$('opVal'); const v=i?+i.value:NaN; return isNaN(v)?randInt(1,99):v; };

  if(algo.kind==='sort'){
    add(el('span','op-label','Size'));
    const size=el('input'); size.type='range'; size.min='6'; size.max='28'; size.value=String(VIZ.barCount||14); size.className='speed'; size.style.width='110px';
    size.addEventListener('input',()=>{ VIZ.barCount=+size.value; loadSortSteps(algo,randArray(VIZ.barCount)); });
    add(size);
    add(btn('🎲 Randomize',()=>loadSortSteps(algo,randArray(VIZ.barCount||14)),'accent'));
    add(el('span','op-sep'));
    const custom=el('input','op-input wide'); custom.id='opCustom'; custom.placeholder='Custom: 5, 12, 9, 3 …';
    add(custom);
    add(btn('Apply',()=>{
      const nums=custom.value.split(/[,\s]+/).map(Number).filter(x=>!isNaN(x)&&x>0).slice(0,28);
      if(nums.length>1){ VIZ.barCount=nums.length; loadSortSteps(algo,nums); } else { custom.value=''; custom.placeholder='Enter 2+ positive numbers'; }
    }));
  }
  else if(algo.kind==='search'){
    add(btn('🎲 Randomize',()=>loadSearchSteps(algo,true),'accent'));
    add(el('span','op-sep'));
    add(el('span','op-label','Target'));
    const t=el('input','op-input'); t.id='opTarget'; t.type='number'; t.placeholder='n';
    add(t);
    add(btn('🔍 Search',()=>{ loadSearchSteps(algo,false); VIZ.player.play(); }));
  }
  else if(algo.struct==='stack'){
    add(valInput());
    add(btn('Push',()=>{ runOp(opStackPush(readVal())); },'accent'));
    add(btn('Pop',()=>runOp(opStackPop())));
    add(btn('Peek',()=>runOp(opStackPeek())));
    add(el('span','op-sep'));
    add(btn('🎲 Random',()=>{ VIZ.model=[]; const seq=[]; for(let i=0;i<5;i++){VIZ.model.push(randInt(1,99));} VIZ.player.setSteps([{array:VIZ.model.slice(),msg:'Random stack generated',code:CODE.stackPush,line:0}],false); }));
    add(btn('Clear',()=>{ VIZ.model=[]; VIZ.player.setSteps([{array:[],msg:'Stack cleared',code:CODE.stackPush,line:0}],false); },'danger'));
  }
  else if(algo.struct==='queue'){
    add(valInput());
    add(btn('Enqueue',()=>runOp(opQueueEnq(readVal())),'accent'));
    add(btn('Dequeue',()=>runOp(opQueueDeq())));
    add(btn('Peek',()=>runOp(opQueuePeek())));
    add(el('span','op-sep'));
    add(btn('🎲 Random',()=>{ VIZ.model=[]; for(let i=0;i<5;i++)VIZ.model.push(randInt(1,99)); VIZ.player.setSteps([{array:VIZ.model.slice(),msg:'Random queue generated',code:CODE.queueEnq,line:0}],false); }));
    add(btn('Clear',()=>{ VIZ.model=[]; VIZ.player.setSteps([{array:[],msg:'Queue cleared',code:CODE.queueEnq,line:0}],false); },'danger'));
  }
  else if(algo.struct==='list'){
    add(valInput());
    add(btn('Insert Head',()=>runOp(opListInsHead(readVal())),'accent'));
    add(btn('Insert Tail',()=>runOp(opListInsTail(readVal()))));
    add(btn('Delete',()=>runOp(opListDelete(readVal()))));
    add(btn('Search',()=>runOp(opListSearch(readVal()))));
    add(el('span','op-sep'));
    add(btn('Clear',()=>{ VIZ.model=[]; VIZ.player.setSteps([{array:[],msg:'List cleared',code:CODE.listInsH,line:0}],false); },'danger'));
  }
  else if(algo.struct==='bst'){
    add(valInput());
    add(btn('Insert',()=>runOp(opBstInsert(readVal())),'accent'));
    add(btn('Search',()=>runOp(opBstSearch(readVal()))));
    add(btn('Delete',()=>runOp(opBstDelete(readVal()))));
    add(el('span','op-sep'));
    add(el('span','op-label','Traverse'));
    add(btn('Inorder',()=>runOp(opBstTraverse('inorder'),true)));
    add(btn('Preorder',()=>runOp(opBstTraverse('preorder'),true)));
    add(btn('Postorder',()=>runOp(opBstTraverse('postorder'),true)));
    add(btn('Level',()=>runOp(opBstTraverse('level'),true)));
    add(el('span','op-sep'));
    add(btn('🎲 Random',()=>{ VIZ.model={tree:null}; const used=new Set(); while(used.size<7)used.add(randInt(10,99)); [...used].forEach(x=>opBstInsert(x)); VIZ.player.setSteps([{tree:serializeTree(VIZ.model.tree),hi:{},msg:'Random BST generated',code:CODE.bstInsert,line:0}],false); }));
    add(btn('Clear',()=>{ VIZ.model={tree:null}; VIZ.player.setSteps([{tree:{nodes:[],edges:[],count:0},hi:{},msg:'Tree cleared',code:CODE.bstInsert,line:0}],false); },'danger'));
  }
  else if(algo.struct==='graph'){
    add(btn('🔄 Regenerate',()=>{ VIZ.model=makeGraph(randInt(6,8)); VIZ.player.setSteps([{visited:[],frontier:[],order:[],msg:'New graph generated — press Run',code:CODE[algo.mode],line:0}],false); },''));
    add(el('span','op-sep'));
    add(el('span','op-label','Start'));
    const sel=el('select','op-input'); sel.id='opStart'; sel.style.width='62px';
    const fill=()=>{ sel.innerHTML=''; for(let i=0;i<VIZ.model.n;i++){ const o=el('option',null,String(i)); o.value=i; sel.appendChild(o); } };
    fill(); add(sel);
    add(btn('▶ Run '+(algo.mode==='bfs'?'BFS':'DFS'),()=>{
      const start=+(($('opStart')||{}).value||0);
      const steps = algo.mode==='bfs'?genBFS(VIZ.model,start):genDFS(VIZ.model,start);
      VIZ.player.setSteps(steps,true);
    },'accent'));
    // keep start selector in sync when graph regenerates
    VIZ._refreshStart=fill;
  }
  else if(algo.struct==='heap'){
    add(valInput());
    add(btn('Insert',()=>runOp(opHeapInsert(readVal())),'accent'));
    add(btn('Extract Min',()=>runOp(opHeapExtract())));
    add(el('span','op-sep'));
    add(btn('🎲 Random',()=>{ VIZ.model=[]; const cnt=randInt(5,8); for(let i=0;i<cnt;i++)opHeapInsert(randInt(1,99)); VIZ.player.setSteps([{heap:VIZ.model.slice(),hi:{},msg:'Random heap generated',code:CODE.heapIns,line:0}],false); }));
    add(btn('Clear',()=>{ VIZ.model=[]; VIZ.player.setSteps([{heap:[],hi:{},msg:'Heap cleared',code:CODE.heapIns,line:0}],false); },'danger'));
  }
  else if(algo.struct==='avl'){
    add(valInput());
    add(btn('Insert',()=>runOp(opAvlInsert(readVal())),'accent'));
    add(btn('Search',()=>runOp(opBstSearch(readVal()))));
    add(el('span','op-sep'));
    add(el('span','op-label','Traverse'));
    add(btn('Inorder',()=>runOp(opBstTraverse('inorder'),true)));
    add(btn('Level',()=>runOp(opBstTraverse('level'),true)));
    add(el('span','op-sep'));
    add(btn('🎲 Random',()=>{ VIZ.model={tree:null}; const used=new Set(); while(used.size<7)used.add(randInt(5,99)); [...used].forEach(x=>opAvlInsert(x)); VIZ.player.setSteps([{tree:serializeTree(VIZ.model.tree),hi:{},msg:'Random AVL generated',code:CODE.avlIns,line:0}],false); }));
    add(btn('Clear',()=>{ VIZ.model={tree:null}; VIZ.player.setSteps([{tree:{nodes:[],edges:[],count:0},hi:{},msg:'Tree cleared',code:CODE.avlIns,line:0}],false); },'danger'));
  }
  else if(algo.struct==='dijkstra'){
    add(btn('🔄 Regenerate',()=>{ VIZ.model=makeWeightedGraph(randInt(5,7)); if(VIZ._refreshStart)VIZ._refreshStart(); VIZ.player.setSteps([{dist:[],visited:[],msg:'New weighted graph — pick a source and Run',code:CODE.dijkstra,line:0}],false); }));
    add(el('span','op-sep'));
    add(el('span','op-label','Source'));
    const sel=el('select','op-input'); sel.id='opStart'; sel.style.width='62px';
    const fill=()=>{ sel.innerHTML=''; for(let i=0;i<VIZ.model.n;i++){ const o=el('option',null,String(i)); o.value=i; sel.appendChild(o); } };
    fill(); add(sel); VIZ._refreshStart=fill;
    add(btn('▶ Run Dijkstra',()=>{ const start=+(($('opStart')||{}).value||0); VIZ.player.setSteps(genDijkstra(VIZ.model,start),true); },'accent'));
  }
  else if(algo.struct==='grid'){
    add(btn('🔄 New Maze',()=>{ VIZ.model=makeGrid(); VIZ.player.setSteps([{visited:[],frontier:[],path:[],msg:'Edit walls, then Run',code:CODE.grid,line:0}],false); }));
    add(btn('🧹 Clear Walls',()=>{ if(VIZ.model)VIZ.model.walls.clear(); VIZ.player.setSteps([{visited:[],frontier:[],path:[],msg:'Walls cleared — Run to find the path',code:CODE.grid,line:0}],false); }));
    add(el('span','op-sep'));
    add(btn('▶ Run BFS',()=>runOp(genGridBFS(VIZ.model),true),'accent'));
  }
  else if(algo.struct==='rectree'){
    add(el('span','op-label','n'));
    const t=el('input','op-input'); t.id='opN'; t.type='number'; t.value='5'; t.min='1'; t.max='8'; t.style.width='62px'; add(t);
    add(btn('▶ Visualize',()=>{ const n=Math.max(1,Math.min(8,+($('opN').value||5))); VIZ.player.setSteps(genFibTree(n),true); },'accent'));
  }
  else if(algo.struct==='hanoi'){
    add(el('span','op-label','Disks'));
    const t=el('input','op-input'); t.id='opN'; t.type='number'; t.value='3'; t.min='1'; t.max='7'; t.style.width='62px'; add(t);
    add(btn('▶ Solve',()=>{ const n=Math.max(1,Math.min(7,+($('opN').value||3))); VIZ.player.setSteps(genHanoi(n),true); },'accent'));
  }
  else if(algo.struct==='dp1'){
    add(el('span','op-label','n'));
    const t=el('input','op-input'); t.id='opN'; t.type='number'; t.value='10'; t.min='1'; t.max='20'; t.style.width='62px'; add(t);
    add(btn('▶ Run',()=>{ const n=Math.max(1,Math.min(20,+($('opN').value||10))); VIZ.player.setSteps(genFibDP(n),true); },'accent'));
  }
  else if(algo.struct==='dp2'){
    const a=el('input','op-input'); a.id='opA'; a.value='AGCAT'; a.placeholder='string A'; a.style.width='112px'; a.style.fontFamily="'JetBrains Mono',monospace";
    const b=el('input','op-input'); b.id='opB'; b.value='GAC'; b.placeholder='string B'; b.style.width='112px'; b.style.fontFamily="'JetBrains Mono',monospace";
    add(a); add(b);
    add(btn('▶ Run LCS',()=>{ const sa=((($('opA').value||'').toUpperCase().replace(/[^A-Z0-9]/g,'')).slice(0,10))||'AGCAT'; const sb=((($('opB').value||'').toUpperCase().replace(/[^A-Z0-9]/g,'')).slice(0,10))||'GAC'; VIZ.player.setSteps(genLCS(sa,sb),true); },'accent'));
  }

  /* Share the current configuration as a copyable link */
  add(el('span','op-sep'));
  const shareBtn=btn('🔗 Share',()=>{
    const url=buildShareUrl();
    const done=()=>{ shareBtn.textContent='✓ Link copied'; setTimeout(()=>{ shareBtn.textContent='🔗 Share'; },1500); };
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(url).then(done,()=>{ history.replaceState(null,'',url); done(); });
    else { history.replaceState(null,'',url); done(); }
  });
  add(shareBtn);
}
/* run a generated op sequence (autoplay quick ops; longer ones still scrubbable) */
function runOp(steps,autoplay){
  if(!steps||!steps.length)return;
  VIZ.player.setSteps(steps, autoplay!==false && steps.length>1);
  if(VIZ.algo&&VIZ.algo.struct==='graph'&&VIZ._refreshStart)VIZ._refreshStart();
}

/* ════════════════════════════════════════════════════════════
   PLAYER WIRING + CODE RENDER
════════════════════════════════════════════════════════════ */
function renderCode(lines, active){
  const box=$('vizCode'); if(!box)return;
  if(lines!==VIZ._codeRef){
    VIZ._codeRef=lines;
    box.innerHTML='';
    lines.forEach((ln,idx)=>{
      const row=el('div','cl'); row.dataset.l=idx;
      row.appendChild(el('span','cln',String(idx+1)));
      const t=el('span','clt'); t.textContent=ln; row.appendChild(t);
      box.appendChild(row);
    });
  }
  box.querySelectorAll('.cl').forEach(d=>d.classList.toggle('active', +d.dataset.l===active));
}
function wirePlayer(){
  const p=VIZ.player;
  p.onUpdate=(pl)=>{
    const play=$('pcPlay'); if(!play)return;   // controls gone (view changed) — skip
    const step=pl.steps[pl.i]||{};
    play.textContent = pl.playing ? '❚❚' : (pl.i>=pl.steps.length-1 ? '↻' : '▶');
    const scrub=$('pcScrub'); if(scrub){ scrub.max=Math.max(0,pl.steps.length-1); scrub.value=pl.i; }
    const msg=$('vizMsg'); if(msg)msg.textContent=step.msg||'';
    const counter=$('vizCounter'); if(counter)counter.textContent=`step ${pl.i+1} / ${pl.steps.length}`;
    const code = step.code || (VIZ.algo?CODE[VIZ.algo.id]:null);
    if(code)renderCode(code, step.line);
    const back=$('pcBack'); if(back)back.disabled=pl.i<=0;
    const fwd=$('pcFwd'); if(fwd)fwd.disabled=pl.i>=pl.steps.length-1;
  };
  $('pcPlay').addEventListener('click',()=>p.toggle());
  $('pcBack').addEventListener('click',()=>p.stepB());
  $('pcFwd').addEventListener('click',()=>p.stepF());
  $('pcReset').addEventListener('click',()=>p.reset());
  $('pcScrub').addEventListener('input',function(){ p.seek(+this.value); });
  const sp=$('pcSpeed'); p.setSpeed(+sp.value); sp.addEventListener('input',function(){ p.setSpeed(+this.value); });
}

/* ════════════════════════════════════════════════════════════
   ROUTER
════════════════════════════════════════════════════════════ */
function setCrumb(algo){
  const c=$('crumb');
  if(!algo){ c.innerHTML='<a id="crumbHome">Home</a>'; }
  else c.innerHTML=`<a id="crumbHome">Home</a><span class="sep">/</span><a class="crumb-cat">${escapeHtml(algo.category.name)}</a><span class="sep">/</span><strong>${escapeHtml(algo.name)}</strong>`;
  const ch=$('crumbHome'); if(ch)ch.addEventListener('click',()=>location.hash='#home');
  const cc=document.querySelector('.crumb-cat'); if(cc)cc.addEventListener('click',()=>{ location.hash='#home'; });
}
function route(){
  VIZ.player.pause();
  const hash=location.hash||'#home';
  closeSidebar();
  if(hash.indexOf('#v/')===0){
    const raw=hash.slice(3), qi=raw.indexOf('?');
    const id=qi<0?raw:raw.slice(0,qi);
    VIZ.shareParams = qi<0?null:parseQuery(raw.slice(qi+1));
    const algo=ALGOS[id];
    if(algo){ setActiveNav(id); setCrumb(algo); buildViz(algo); window.scrollTo({top:0,behavior:'smooth'}); return; }
  }
  setActiveNav(null); setCrumb(null); buildHome();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ════════════════════════════════════════════════════════════
   SIDEBAR / MOBILE / THEME / KEYBOARD
════════════════════════════════════════════════════════════ */
function openSidebar(){ $('sidebar').classList.add('open'); $('sidebarOverlay').classList.add('show'); }
function closeSidebar(){ $('sidebar').classList.remove('open'); $('sidebarOverlay').classList.remove('show'); }

function initChrome(){
  buildSidebar();

  $('menuBtn').addEventListener('click',()=>{ $('sidebar').classList.contains('open')?closeSidebar():openSidebar(); });
  $('sidebarOverlay').addEventListener('click',closeSidebar);
  $('logoHome').addEventListener('click',()=>location.hash='#home');

  /* sidebar filter */
  $('sideSearch').addEventListener('input',function(){
    const q=this.value.trim().toLowerCase();
    document.querySelectorAll('.nav-group').forEach(g=>{
      let any=false;
      g.querySelectorAll('.nav-link').forEach(l=>{ const show=!q||l.textContent.toLowerCase().indexOf(q)>-1; l.style.display=show?'':'none'; if(show)any=true; });
      g.style.display=any?'':'none';
    });
  });

  /* theme — uses data-theme + dsa_theme key; auth-guard footer proxies to #themeBtn */
  const saved=localStorage.getItem('dsa_theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  $('themeBtn').textContent=saved==='dark'?'🌙':'☀️';
  $('themeBtn').addEventListener('click',()=>{
    const cur=document.documentElement.getAttribute('data-theme');
    const next=cur==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('dsa_theme',next);
    $('themeBtn').textContent=next==='dark'?'🌙':'☀️';
  });

  /* keyboard shortcuts */
  document.addEventListener('keydown',e=>{
    const typing = /^(INPUT|TEXTAREA|SELECT)$/.test((e.target.tagName||''));
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); const hs=$('homeSearch'); if(hs)hs.focus(); else $('sideSearch').focus(); return; }
    if(typing)return;
    if(!VIZ.algo||location.hash.indexOf('#v/')!==0)return;
    if(e.key===' '){ e.preventDefault(); VIZ.player.toggle(); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); VIZ.player.stepF(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); VIZ.player.stepB(); }
    else if(e.key==='r'||e.key==='R'){ VIZ.player.reset(); }
  });

  /* re-render current step on resize so svg layouts stay crisp */
  let rz; window.addEventListener('resize',()=>{ clearTimeout(rz); rz=setTimeout(()=>{ if(VIZ.player.steps.length)VIZ.player._render(); },150); });

  /* scroll progress */
  window.addEventListener('scroll',()=>{
    const total=document.documentElement.scrollHeight-window.innerHeight;
    $('scroll-progress').style.width=(total>0?(window.scrollY/total)*100:0)+'%';
  });

  window.addEventListener('hashchange',route);
}

/* ════════════════════════════════════════════════════════════
   BOOT  (brief skeleton → app)
════════════════════════════════════════════════════════════ */
function boot(){
  VIZ.barCount=14;
  $('view').innerHTML='<div class="skel-grid">'+Array(8).fill('<div class="skel-card"></div>').join('')+'</div>';
  initChrome();
  setTimeout(route,260); // micro-interaction: skeleton flash then route
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot); else boot();

})();
</script>
