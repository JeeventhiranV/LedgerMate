<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Study Resources</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<!-- Supabase JS SDK v2 (must load before config) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../auth/supabase-config.js"></script>
<style>
/* ─── Design system (mirrors other pages) ─── */
:root[data-theme="dark"]{
  --bg:#07090f;--bg2:#0e1117;--bg3:#141820;--bg4:#1a1f2e;
  --border:#1e2436;--border2:#2a3148;
  --text:#e2e8f8;--text2:#8a95b8;--text3:#535d7e;
  --blue:#4f8ef7;--purple:#8b5cf6;--teal:#06d6a0;--rose:#f43f5e;
  --gold:#f59e0b;--card:#0f1319;
  --glow-blue:rgba(79,142,247,.15);--glow-purple:rgba(139,92,246,.12);
  --shadow:0 8px 40px rgba(0,0,0,.7);
  --glass:rgba(14,17,23,.92);
}
:root[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#ffffff;--bg3:#f5f7ff;--bg4:#edf0fb;
  --border:#dde3f5;--border2:#c5cee8;
  --text:#1a1e35;--text2:#475089;--text3:#8891be;
  --blue:#2563eb;--purple:#7c3aed;--teal:#059669;--rose:#e11d48;
  --gold:#d97706;--card:#ffffff;
  --glow-blue:rgba(37,99,235,.08);--glow-purple:rgba(124,58,237,.07);
  --shadow:0 4px 24px rgba(0,0,0,.12);
  --glass:rgba(255,255,255,.95);
}

*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  background-image:
    radial-gradient(ellipse 70% 60% at 30% 20%, var(--glow-purple), transparent),
    radial-gradient(ellipse 50% 50% at 70% 80%, var(--glow-blue), transparent);
}

/* ─── Card ─── */
.login-wrap{width:100%;max-width:420px}

.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{
  width:52px;height:52px;border-radius:14px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 8px 24px rgba(79,142,247,.35)
}
.login-logo-text{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.login-logo-sub{font-size:12px;color:var(--text3);margin-top:4px}

.login-card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 28px 24px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px)
}

/* ─── Tabs ─── */
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}
.tab{
  flex:1;padding:8px;border:none;background:transparent;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  color:var(--text3);border-radius:7px;transition:all .2s
}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* ─── Section visibility ─── */
.tab-section{display:none}
.tab-section.active{display:block}

/* ─── Form elements ─── */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.field input,.field textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);
  font-family:'Inter',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none
}
.field input:focus,.field textarea:focus{
  border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.12)
}
.field textarea{min-height:72px;resize:vertical}

/* ─── Buttons ─── */
.btn-primary{
  width:100%;padding:11px;border:none;border-radius:10px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;transition:opacity .2s,transform .1s;letter-spacing:.01em
}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.btn-google{
  width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;
  background:var(--bg3);cursor:pointer;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:500;color:var(--text2);
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border-color .2s,background .2s
}
.btn-google:hover{border-color:var(--blue);background:var(--bg4)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}

.btn-link{
  background:none;border:none;padding:0;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:12px;color:var(--blue);
  text-decoration:underline;text-underline-offset:2px
}
.btn-link:hover{color:var(--purple)}

/* ─── Error / success messages ─── */
.msg{
  border-radius:9px;padding:10px 14px;font-size:13px;
  margin-bottom:14px;display:none;line-height:1.4
}
.msg.error{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);color:#f43f5e}
.msg.success{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.25);color:#06d6a0}
.msg.show{display:block}

/* ─── Forgot password ─── */
.forgot-wrap{text-align:right;margin-top:-8px;margin-bottom:16px}

/* ─── Footer ─── */
.login-footer{
  text-align:center;margin-top:20px;font-size:11px;color:var(--text3);line-height:1.6
}

/* ─── Theme toggle ─── */
.theme-btn{
  position:fixed;top:16px;right:16px;background:var(--bg2);
  border:1px solid var(--border);border-radius:8px;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s
}
.theme-btn:hover{border-color:var(--blue)}

/* ─── Request access note ─── */
.note-box{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.6;
  margin-bottom:18px
}
.note-box strong{color:var(--text)}
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>

<div class="login-wrap">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">📚</div>
    <div class="login-logo-text">Study Resources</div>
    <div class="login-logo-sub">Admin-approved access only</div>
  </div>

  <!-- Card -->
  <div class="login-card">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="signin">Sign In</button>
      <button class="tab" data-tab="request">Request Access</button>
    </div>

    <!-- ── SIGN IN ── -->
    <div class="tab-section active" id="tab-signin">

      <div class="msg error" id="signinError"></div>

      <div class="field">
        <label for="signinEmail">Email</label>
        <input type="email" id="signinEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label for="signinPassword">Password</label>
        <input type="password" id="signinPassword" placeholder="Your password" autocomplete="current-password"/>
      </div>

      <div class="forgot-wrap">
        <button class="btn-link" id="forgotBtn">Forgot password?</button>
      </div>

      <button class="btn-primary" id="signinBtn">Sign In →</button>

      <div class="divider">or</div>

      <button class="btn-google" id="googleBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

    </div>

    <!-- ── REQUEST ACCESS ── -->
    <div class="tab-section" id="tab-request">

      <div class="note-box">
        <strong>Access is by invitation only.</strong><br>
        Submit your details and the admin will review your request. If approved, you'll receive an email to set up your account.
      </div>

      <div class="msg error"   id="reqError"></div>
      <div class="msg success" id="reqSuccess"></div>

      <div class="field">
        <label for="reqName">Full Name</label>
        <input type="text" id="reqName" placeholder="Your name"/>
      </div>

      <div class="field">
        <label for="reqEmail">Email</label>
        <input type="email" id="reqEmail" placeholder="you@example.com"/>
      </div>

      <div class="field">
        <label for="reqMsg">Why do you need access? <span style="color:var(--text3)">(optional)</span></label>
        <textarea id="reqMsg" placeholder="Brief note…"></textarea>
      </div>

      <button class="btn-primary" id="reqBtn">Submit Request</button>

    </div>

  </div><!-- /card -->

  <div class="login-footer">
    🔒 All study data stored securely · Admin-approved access only
  </div>

</div><!-- /wrap -->

<script>
(function () {

  /* ── Route helpers ── */
  function _getStudyHubUrl() {
    var parts = window.location.pathname.split('/');
    var idx   = parts.lastIndexOf('study');
    if (idx >= 0) return parts.slice(0, idx + 1).join('/') + '/index.html';
    return '/study/index.html';
  }

  /* ── If already signed in, skip login ── */
  _supabase.auth.getSession().then(function (res) {
    if (res.data && res.data.session) {
      window.location.replace(_getStudyHubUrl());
    }
  });

  /* ── Listen for OAuth / magic-link callback ── */
  _supabase.auth.onAuthStateChange(function (event, session) {
    if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
      window.location.replace(_getStudyHubUrl());
    }
  });

  /* ── Helpers ── */
  function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg error show';
  }
  function hideMsg(id) {
    document.getElementById(id).className = 'msg error';
  }
  function showSuccess(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg success show';
  }
  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.textContent = loading ? '…' : btn.dataset.label;
  }

  /* ── Tabs ── */
  document.querySelectorAll('.tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-section').forEach(function (s) { s.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  /* ── Store button labels ── */
  ['signinBtn','reqBtn'].forEach(function (id) {
    var el = document.getElementById(id);
    el.dataset.label = el.textContent;
  });

  /* ── Sign In ── */
  document.getElementById('signinBtn').addEventListener('click', async function () {
    hideMsg('signinError');
    var email    = document.getElementById('signinEmail').value.trim();
    var password = document.getElementById('signinPassword').value;

    if (!email)    { showError('signinError', 'Please enter your email.'); return; }
    if (!password) { showError('signinError', 'Please enter your password.'); return; }

    setLoading(this, true);
    var res = await _supabase.auth.signInWithPassword({ email: email, password: password });

    if (res.error) {
      var msg = res.error.message || 'Sign in failed.';
      if (msg.toLowerCase().includes('invalid')) msg = 'Incorrect email or password.';
      if (msg.toLowerCase().includes('confirm')) msg = 'Please verify your email first — check your inbox.';
      showError('signinError', msg);
      setLoading(this, false);
    }
    // success handled by onAuthStateChange
  });

  /* ── Google OAuth ── */
  document.getElementById('googleBtn').addEventListener('click', async function () {
    hideMsg('signinError');
    var res = await _supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
    if (res.error) {
      showError('signinError', res.error.message || 'Google sign-in failed.');
    }
  });

  /* ── Forgot password ── */
  document.getElementById('forgotBtn').addEventListener('click', async function () {
    var email = document.getElementById('signinEmail').value.trim();
    if (!email) {
      showError('signinError', 'Enter your email above first, then click Forgot password.');
      return;
    }
    hideMsg('signinError');
    var res = await _supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname
    });
    if (res.error) {
      showError('signinError', res.error.message);
    } else {
      showError('signinError', ''); // clear error
      var el = document.getElementById('signinError');
      el.textContent = 'Password reset email sent — check your inbox.';
      el.className = 'msg success show';
    }
  });

  /* ── Request Access ── */
  document.getElementById('reqBtn').addEventListener('click', async function () {
    hideMsg('reqError');
    hideMsg('reqSuccess');
    var name  = document.getElementById('reqName').value.trim();
    var email = document.getElementById('reqEmail').value.trim();
    var msg   = document.getElementById('reqMsg').value.trim();

    if (!name)  { showError('reqError', 'Please enter your name.'); return; }
    if (!email) { showError('reqError', 'Please enter your email.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('reqError', 'Please enter a valid email address.'); return;
    }

    setLoading(this, true);
    var res = await _supabase.from('access_requests').insert({
      name    : name,
      email   : email,
      message : msg || null,
      status  : 'pending'
    });

    if (res.error) {
      var errMsg = res.error.message || 'Failed to submit request.';
      if (errMsg.includes('unique') || errMsg.includes('duplicate')) {
        errMsg = 'A request from this email already exists. We\'ll review it soon.';
      }
      showError('reqError', errMsg);
    } else {
      showSuccess('reqSuccess',
        '✅ Request submitted! The admin will review it and send you an invite email if approved.'
      );
      document.getElementById('reqName').value  = '';
      document.getElementById('reqEmail').value = '';
      document.getElementById('reqMsg').value   = '';
    }
    setLoading(this, false);
  });

  /* ── Enter key on sign-in fields ── */
  ['signinEmail','signinPassword'].forEach(function (id) {
    document.getElementById(id).addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('signinBtn').click();
    });
  });

  /* ── Theme toggle ── */
  var saved = localStorage.getItem('sr_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
  document.getElementById('themeBtn').addEventListener('click', function () {
    var cur  = document.documentElement.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('sr_theme', next);
    this.textContent = next === 'dark' ? '🌙' : '☀️';
  });

}());
</script>
</body>
</html>
